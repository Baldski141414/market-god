<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market God</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              950: '#0a0a12',
              900: '#111827',
              800: '#1f2937',
              700: '#374151',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif; }
    .pill { @apply text-xs font-semibold px-2 py-0.5 rounded-full; }
    .card { @apply bg-gray-900 rounded-xl border border-gray-800 p-4; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .score-bar { transition: width 0.4s ease; }
    .row-enter { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen bg-gray-950 p-4">

<!-- ── Header ───────────────────────────────────────────────────────────────── -->
<div class="flex items-center justify-between mb-5">
  <div class="flex items-center gap-3">
    <div class="text-2xl font-black tracking-tight text-white">⚡ Market God</div>
    <span id="engine-badge" class="pill bg-yellow-900 text-yellow-300">starting</span>
  </div>
  <div class="flex items-center gap-4 text-sm text-gray-400">
    <span>VIX: <span id="vix-val" class="font-mono text-white">—</span></span>
    <span id="last-update" class="text-gray-600 text-xs">never</span>
  </div>
</div>

<!-- ── Portfolio summary ─────────────────────────────────────────────────────── -->
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
  <div class="card">
    <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Equity</div>
    <div id="equity" class="text-2xl font-bold text-white font-mono">$—</div>
  </div>
  <div class="card">
    <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total P&L</div>
    <div id="total-pnl" class="text-2xl font-bold font-mono">—</div>
  </div>
  <div class="card">
    <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Cash</div>
    <div id="cash" class="text-2xl font-bold text-white font-mono">$—</div>
  </div>
  <div class="card">
    <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Win Rate</div>
    <div class="flex items-end gap-2">
      <div id="win-rate" class="text-2xl font-bold text-white font-mono">—%</div>
      <div id="pf" class="text-xs text-gray-500 mb-1">PF —</div>
    </div>
  </div>
</div>

<!-- ── Circuit breaker status ─────────────────────────────────────────────────── -->
<div id="cb-banner" class="hidden mb-4 rounded-xl border border-red-800 bg-red-950 px-4 py-3 text-red-300 text-sm font-semibold flex items-center gap-2">
  <span>⛔</span><span id="cb-reason"></span>
</div>

<!-- ── Main two-column layout ─────────────────────────────────────────────────── -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">

  <!-- Open Positions -->
  <div class="card">
    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Open Positions
      <span id="pos-count" class="ml-1 pill bg-gray-800 text-gray-300">0</span>
    </h2>
    <div id="positions-empty" class="text-gray-600 text-sm py-4 text-center">No open positions</div>
    <div id="positions-table" class="space-y-2 hidden"></div>
  </div>

  <!-- Live Signals -->
  <div class="card">
    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Signal Scores</h2>
    <div id="signals-table" class="space-y-2"></div>
  </div>

</div>

<!-- ── Trade log + Recent closed trades ────────────────────────────────────────── -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

  <!-- Live event log -->
  <div class="card">
    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Event Log</h2>
    <div id="trade-log" class="space-y-1 max-h-64 overflow-y-auto text-xs font-mono text-gray-400"></div>
    <div id="trade-log-empty" class="text-gray-600 text-sm py-4 text-center text-xs">No events yet</div>
  </div>

  <!-- Closed trades -->
  <div class="card">
    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Closed Trades</h2>
    <div id="closed-empty" class="text-gray-600 text-sm py-4 text-center text-xs">No completed trades</div>
    <div id="closed-table" class="space-y-1 max-h-64 overflow-y-auto hidden"></div>
  </div>

</div>

<!-- ── Stats bar ─────────────────────────────────────────────────────────────── -->
<div class="mt-4 card flex flex-wrap gap-6 text-xs text-gray-500">
  <span>Trades: <span id="stat-total" class="text-gray-300 font-mono">0</span></span>
  <span>Wins: <span id="stat-wins" class="text-green-400 font-mono">0</span></span>
  <span>Losses: <span id="stat-losses" class="text-red-400 font-mono">0</span></span>
  <span>Avg Win: <span id="stat-avgwin" class="text-green-400 font-mono">$0</span></span>
  <span>Avg Loss: <span id="stat-avgloss" class="text-red-400 font-mono">$0</span></span>
  <span>Loss Streak: <span id="stat-streak" class="text-yellow-400 font-mono">0</span></span>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = (n, d=2) => n == null ? '—' : n.toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtMoney = n => n == null ? '—' : '$' + fmt(n);
const fmtPct = n => n == null ? '—' : (n > 0 ? '+' : '') + fmt(n) + '%';
const fmtTime = iso => iso ? new Date(iso).toLocaleTimeString() : '—';

function pnlClass(v) { return v > 0 ? 'text-green-400' : v < 0 ? 'text-red-400' : 'text-gray-400'; }
function pnlSign(v) { return v > 0 ? '+' : ''; }

// ── Score bar colour ──────────────────────────────────────────────────────────
function scoreColor(score) {
  if (score >= 50) return 'bg-green-500';
  if (score >= 35) return 'bg-yellow-500';
  if (score >= 20) return 'bg-orange-500';
  return 'bg-gray-700';
}
function scoreLabelColor(score) {
  if (score >= 50) return 'text-green-400';
  if (score >= 35) return 'text-yellow-400';
  if (score >= 20) return 'text-orange-400';
  return 'text-gray-500';
}

// ── Render positions ──────────────────────────────────────────────────────────
function renderPositions(positions) {
  const keys = Object.keys(positions);
  $('pos-count').textContent = keys.length;
  if (keys.length === 0) {
    $('positions-empty').classList.remove('hidden');
    $('positions-table').classList.add('hidden');
    return;
  }
  $('positions-empty').classList.add('hidden');
  $('positions-table').classList.remove('hidden');
  $('positions-table').innerHTML = keys.map(sym => {
    const p = positions[sym];
    const pnlCls = pnlClass(p.pnl);
    const trailBadge = p.trailing_active
      ? '<span class="pill bg-blue-900 text-blue-300 ml-1">trail</span>' : '';
    return `
    <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="font-bold text-white">${sym}</span>
          ${trailBadge}
        </div>
        <div class="flex items-center gap-2">
          <span class="${pnlCls} font-mono font-semibold">${pnlSign(p.pnl)}$${fmt(Math.abs(p.pnl))} (${fmtPct(p.pnl_pct)})</span>
          <button onclick="closePosition('${sym}')"
            class="text-xs text-red-400 hover:text-red-300 border border-red-800 hover:border-red-600 rounded px-2 py-0.5 transition">✕ Close</button>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 text-xs text-gray-400 mb-2">
        <div>Entry <span class="text-white font-mono">${fmtMoney(p.entry_price)}</span></div>
        <div>Now <span class="text-white font-mono">${fmtMoney(p.current_price)}</span></div>
        <div>Shares <span class="text-white font-mono">${p.shares}</span></div>
        <div>SL <span class="text-red-400 font-mono">${fmtMoney(p.stop_loss)}</span></div>
        <div>TP <span class="text-green-400 font-mono">${fmtMoney(p.take_profit)}</span></div>
        <div>Peak <span class="text-blue-400 font-mono">${fmtMoney(p.highest_price)}</span></div>
      </div>
      <div class="text-xs text-gray-500 truncate" title="${p.entry_reason}">
        📋 ${p.entry_reason.substring(0,120)}
      </div>
    </div>`;
  }).join('');
}

// ── Render signals ────────────────────────────────────────────────────────────
function renderSignals(signals) {
  const syms = Object.keys(signals).sort((a,b) =>
    (signals[b].quality_score||0) - (signals[a].quality_score||0)
  );
  $('signals-table').innerHTML = syms.map(sym => {
    const s = signals[sym];
    const score = s.quality_score || 0;
    const pct = Math.min(score, 100);
    const conds = s.conditions || {};
    const condHtml = Object.entries(conds).map(([k,v]) =>
      `<span class="${v ? 'text-green-400' : 'text-gray-600'}">${v ? '✓' : '✗'} ${k.replace('_',' ')}</span>`
    ).join(' ');
    const signalBadge = s.signal
      ? '<span class="pill bg-green-900 text-green-300 blink">BUY</span>'
      : '';
    return `
    <div class="bg-gray-800 rounded-lg p-2.5 border ${s.signal ? 'border-green-700' : 'border-gray-700'}">
      <div class="flex items-center justify-between mb-1.5">
        <div class="flex items-center gap-2">
          <span class="font-bold text-white text-sm">${sym}</span>
          ${signalBadge}
        </div>
        <span class="${scoreLabelColor(score)} font-mono font-bold text-sm">${score}</span>
      </div>
      <div class="w-full bg-gray-700 rounded-full h-1.5 mb-2">
        <div class="score-bar ${scoreColor(score)} h-1.5 rounded-full" style="width:${pct}%"></div>
      </div>
      <div class="flex flex-wrap gap-1.5 text-xs">${condHtml}</div>
      <div class="text-xs text-gray-600 mt-1 truncate" title="${s.reason}">${s.reason}</div>
    </div>`;
  }).join('');
}

// ── Render event log ──────────────────────────────────────────────────────────
function renderLog(events) {
  if (!events.length) {
    $('trade-log').innerHTML = '';
    $('trade-log-empty').classList.remove('hidden');
    return;
  }
  $('trade-log-empty').classList.add('hidden');
  $('trade-log').innerHTML = events.slice(0,50).map(e => {
    const icon = e.type === 'BUY' ? '🟢' : e.type === 'SELL' ? '🔴' : '⚪';
    const time = fmtTime(e.time);
    return `<div class="row-enter flex gap-2 py-0.5 border-b border-gray-800">
      <span class="text-gray-600 shrink-0">${time}</span>
      <span>${icon}</span>
      <span class="text-gray-300 shrink-0">${e.type}</span>
      <span class="text-white font-bold shrink-0">${e.symbol||''}</span>
      ${e.price ? `<span class="text-gray-400 shrink-0">@$${fmt(e.price)}</span>` : ''}
      ${e.score ? `<span class="text-yellow-400 shrink-0">[${e.score}]</span>` : ''}
      <span class="text-gray-600 truncate text-xs">${(e.reason||'').substring(0,80)}</span>
    </div>`;
  }).join('');
}

// ── Render closed trades ───────────────────────────────────────────────────────
function renderClosed(trades) {
  if (!trades.length) {
    $('closed-empty').classList.remove('hidden');
    $('closed-table').classList.add('hidden');
    return;
  }
  $('closed-empty').classList.add('hidden');
  $('closed-table').classList.remove('hidden');
  $('closed-table').innerHTML = trades.slice(0,30).map(t => {
    const pnlCls = pnlClass(t.pnl);
    return `<div class="row-enter flex items-center gap-2 py-1 border-b border-gray-800 text-xs">
      <span class="font-bold text-white w-12 shrink-0">${t.symbol}</span>
      <span class="${pnlCls} font-mono font-semibold w-20 shrink-0">${pnlSign(t.pnl)}$${fmt(Math.abs(t.pnl))}</span>
      <span class="${pnlCls} w-14 shrink-0">${pnlSign(t.pnl_pct)}${fmt(t.pnl_pct)}%</span>
      <span class="text-gray-600 shrink-0">${fmtTime(t.exit_time)}</span>
      <span class="text-gray-500 truncate" title="${t.exit_reason}">${t.exit_reason}</span>
    </div>`;
  }).join('');
}

// ── Main state render ─────────────────────────────────────────────────────────
function render(data) {
  const p = data.portfolio;

  // Engine status
  const badge = $('engine-badge');
  const status = data.engine_status || 'unknown';
  badge.textContent = status;
  badge.className = 'pill ' + (
    status === 'running' ? 'bg-green-900 text-green-300' :
    status === 'starting' ? 'bg-yellow-900 text-yellow-300' :
    'bg-red-900 text-red-300'
  );

  // VIX
  $('vix-val').textContent = data.vix != null ? data.vix : '—';
  $('vix-val').className = 'font-mono ' + (data.vix != null && data.vix >= 25 ? 'text-red-400' : 'text-white');

  // Last update
  $('last-update').textContent = data.last_update ? 'Updated ' + fmtTime(data.last_update) : '';

  // Portfolio
  $('equity').textContent = fmtMoney(p.total_equity);
  const pnlEl = $('total-pnl');
  pnlEl.textContent = (p.total_pnl >= 0 ? '+' : '') + fmtMoney(p.total_pnl) + ' (' + fmtPct(p.total_pnl_pct) + ')';
  pnlEl.className = 'text-2xl font-bold font-mono ' + pnlClass(p.total_pnl);
  $('cash').textContent = fmtMoney(p.cash);

  // Win rate
  const s = data.stats;
  $('win-rate').textContent = s.win_rate + '%';
  $('pf').textContent = 'PF ' + (s.profit_factor || '—');

  // Circuit breaker
  if (!p.can_trade) {
    $('cb-banner').classList.remove('hidden');
    $('cb-reason').textContent = p.block_reason;
  } else {
    $('cb-banner').classList.add('hidden');
  }

  // Stats bar
  $('stat-total').textContent = s.total;
  $('stat-wins').textContent = s.wins;
  $('stat-losses').textContent = s.losses;
  $('stat-avgwin').textContent = '$' + fmt(s.avg_win);
  $('stat-avgloss').textContent = '$' + fmt(s.avg_loss);
  $('stat-streak').textContent = p.loss_streak;

  renderPositions(data.positions || {});
  renderSignals(data.signals || {});
  renderLog(data.trade_log || []);
  renderClosed(data.recent_trades || []);
}

// ── Manual close ──────────────────────────────────────────────────────────────
async function closePosition(sym) {
  if (!confirm(`Close ${sym}?`)) return;
  const res = await fetch(`/api/close/${sym}`, { method: 'POST' });
  const data = await res.json();
  if (data.error) alert(data.error);
}

// ── Polling ───────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    render(data);
  } catch(e) {
    $('engine-badge').textContent = 'unreachable';
    $('engine-badge').className = 'pill bg-red-900 text-red-300';
  }
}

poll();
setInterval(poll, 3000);
</script>
</body>
</html>
